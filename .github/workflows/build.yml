name: Build Windows App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-2022
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
      
      - name: Enable Windows Desktop
        run: flutter config --enable-windows-desktop
      
      - name: Add Windows support
        run: flutter create --platforms=windows .
      
      - name: Get dependencies
        run: flutter pub get
      
      - name: Build Windows Release
        id: build
        continue-on-error: true
        run: flutter build windows --release -v
      
      - name: Check build status
        if: steps.build.outcome == 'failure'
        run: |
          echo "❌ Сборка не удалась!"
          echo "Смотри логи выше для деталей"
          exit 1
      
      - name: Check Release folder
        if: steps.build.outcome == 'success'
        run: |
          if (Test-Path "build\windows\runner\Release\") {
            dir build\windows\runner\Release\
          } else {
            echo "❌ Папка Release не найдена!"
            dir build\windows\runner\
            exit 1
          }
      
      - name: Copy scripts to Release
        if: steps.build.outcome == 'success'
        run: |
          mkdir build\windows\runner\Release\scripts -Force
          copy scripts\print_receipt.py build\windows\runner\Release\scripts\
          copy scripts\install_deps.bat build\windows\runner\Release\scripts\
      
      - name: Create README
        if: steps.build.outcome == 'success'
        run: |
          echo "POS App - Кассовое приложение" > build\windows\runner\Release\README.txt
          echo "=====================================" >> build\windows\runner\Release\README.txt
          echo "" >> build\windows\runner\Release\README.txt
          echo "ПЕРЕД ЗАПУСКОМ:" >> build\windows\runner\Release\README.txt
          echo "1. Установите Python с https://python.org" >> build\windows\runner\Release\README.txt
          echo "2. Установите pyserial: python -m pip install pyserial" >> build\windows\runner\Release\README.txt
          echo "3. Установите драйвер для USB-to-Serial (CH340/CH341)" >> build\windows\runner\Release\README.txt
          echo "4. Запускайте от имени администратора" >> build\windows\runner\Release\README.txt
      
      - name: Upload Windows Build
        if: steps.build.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: pos-app-windows
          path: build/windows/runner/Release/
      
      - name: Upload build logs on failure
        if: steps.build.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: build/
