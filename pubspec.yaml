name: pos_app
description: Кассовое приложение на Flutter
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # База данных
  sqflite: ^2.3.0
  path_provider: ^2.1.0
  path: ^1.9.0
  
  # Состояние
  provider: ^6.0.5
  
  # UI
  intl: ^0.18.1
  flutter_svg: ^2.0.9
  shimmer: ^3.0.0
  
  # Импорт
  excel: ^4.0.6
  file_picker: ^8.1.4
  desktop_drop: ^0.4.4
  
  # Дополнительно
  shared_preferences: ^2.2.2
  flutter_animate: ^4.5.0
  badges: ^3.1.2
  
  # HTTP для Google Sheets
  http: ^1.1.0
  
  # Графики
  fl_chart: ^0.68.0
  
  # Google Sheets API
  googleapis: ^13.2.0
  googleapis_auth: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
